<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      text { font-family: Menlo, Monaco, "SF Mono", Consolas, monospace; }
      .tiny { font-size: 17px; }
      .small { font-size: 20px; }
      .body { font-size: 24px; }
      .large { font-size: 28px; }
      .muted { fill: #84909f; }
      .text { fill: #dae1eb; }
      .line { fill: #596272; }
      .cyan { fill: #59c6ff; }
      .yellow { fill: #f5c95a; }
      .green { fill: #7ee787; }
      .code { fill: #c6ceda; }
      .keyword { fill: #aecfff; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#0b0e12"/>
  <rect x="58" y="54" width="1484" height="886" rx="20" fill="#06080c" filter="url(#shadow)"/>
  <rect x="70" y="64" width="1460" height="866" rx="14" fill="#0b0e12" stroke="#2b3341" stroke-width="2"/>

  <path d="M84 64h1432a14 14 0 0 1 14 14v38H70V78a14 14 0 0 1 14-14Z" fill="#151920"/>
  <circle cx="103" cy="90" r="8" fill="#ff5f56"/>
  <circle cx="133" cy="90" r="8" fill="#ffbd2e"/>
  <circle cx="163" cy="90" r="8" fill="#27c93f"/>
  <text x="178" y="97" class="small muted">marker-jump.nvim  ·  TUI function marks preview</text>
  <text x="1168" y="96" class="tiny muted">toggle: &lt;leader&gt;m   close: q   refresh: r</text>

  <rect x="90" y="136" width="1020" height="729" fill="#0d1218" stroke="#414b5a"/>
  <rect x="1110" y="136" width="16" height="729" fill="#19202a"/>
  <rect x="1126" y="136" width="384" height="729" fill="#11171f" stroke="#414b5a"/>

  <rect x="90" y="136" width="1020" height="38" fill="#131921"/>
  <text x="108" y="162" class="small text">src/router.ts</text>
  <text x="930" y="162" class="tiny muted">TypeScript  142 lines</text>

  <g class="small">
    <text x="112" y="211" class="line">  1</text><text x="178" y="211" class="keyword">import { createRouter } from "./core"</text>
    <text x="112" y="240" class="line">  2</text><text x="178" y="240" class="keyword">import type { Route, Context } from "./types"</text>
    <text x="112" y="269" class="line">  3</text>

    <text x="112" y="298" class="line">  4</text>
    <rect x="168" y="274" width="48" height="29" rx="4" fill="#2b2314" stroke="#f5c95a"/>
    <text x="178" y="297" class="yellow">aa</text>
    <line x1="222" y1="288" x2="300" y2="288" stroke="#4a412a" stroke-width="2"/>
    <text x="312" y="298" class="code">export function createRouteTable(routes: Route[]) {</text>

    <text x="112" y="327" class="line">  5</text><text x="178" y="327" class="keyword">  const table = new Map&lt;string, Route&gt;()</text>
    <text x="112" y="356" class="line">  6</text><text x="178" y="356" class="keyword">  for (const route of routes) table.set(route.path, route)</text>
    <text x="112" y="385" class="line">  7</text><text x="178" y="385" class="keyword">  return table</text>
    <text x="112" y="414" class="line">  8</text><text x="178" y="414" class="code">}</text>
    <text x="112" y="443" class="line">  9</text>

    <rect x="91" y="449" width="1018" height="36" fill="#161f2b"/>
    <text x="112" y="475" class="line"> 10</text>
    <rect x="168" y="451" width="48" height="29" rx="4" fill="#16343e" stroke="#59c6ff"/>
    <text x="178" y="474" class="cyan">as</text>
    <line x1="222" y1="465" x2="300" y2="465" stroke="#294e58" stroke-width="2"/>
    <text x="312" y="475" class="text">function normalizePath(path: string): string {</text>

    <text x="112" y="504" class="line"> 11</text><text x="178" y="504" class="keyword">  return path.replace(/\/+/g, "/").replace(/\/$/, "")</text>
    <text x="112" y="533" class="line"> 12</text><text x="178" y="533" class="code">}</text>
    <text x="112" y="562" class="line"> 13</text>

    <text x="112" y="591" class="line"> 14</text>
    <rect x="168" y="567" width="48" height="29" rx="4" fill="#2b2314" stroke="#f5c95a"/>
    <text x="178" y="590" class="yellow">df</text>
    <line x1="222" y1="581" x2="300" y2="581" stroke="#4a412a" stroke-width="2"/>
    <text x="312" y="591" class="code">async function resolveMiddleware(ctx: Context) {</text>

    <text x="112" y="620" class="line"> 15</text><text x="178" y="620" class="keyword">  const chain = await ctx.app.middleware()</text>
    <text x="112" y="649" class="line"> 16</text><text x="178" y="649" class="keyword">  return chain.filter(Boolean)</text>
    <text x="112" y="678" class="line"> 17</text><text x="178" y="678" class="code">}</text>
    <text x="112" y="707" class="line"> 18</text>

    <text x="112" y="736" class="line"> 19</text>
    <rect x="168" y="712" width="48" height="29" rx="4" fill="#2b2314" stroke="#f5c95a"/>
    <text x="178" y="735" class="yellow">jk</text>
    <line x1="222" y1="726" x2="300" y2="726" stroke="#4a412a" stroke-width="2"/>
    <text x="312" y="736" class="code">export const matchRoute = (path: string, table: RouteTable) =&gt; {</text>

    <text x="112" y="765" class="line"> 20</text><text x="178" y="765" class="keyword">  const key = normalizePath(path)</text>
    <text x="112" y="794" class="line"> 21</text><text x="178" y="794" class="keyword">  return table.get(key) ?? table.get("*")</text>
    <text x="112" y="823" class="line"> 22</text><text x="178" y="823" class="code">}</text>
  </g>

  <rect x="90" y="865" width="1020" height="37" fill="#181f2a"/>
  <rect x="101" y="870" width="77" height="26" rx="3" fill="#7ee787"/>
  <text x="108" y="890" class="tiny" fill="#0d1218">NORMAL</text>
  <text x="198" y="890" class="tiny muted">marker-jump active: type 2-char mark to jump</text>
  <text x="910" y="890" class="tiny muted">Ln 10, Col 1</text>

  <rect x="1126" y="136" width="384" height="55" fill="#18202b"/>
  <text x="1144" y="171" class="body text">Function Marks</text>
  <text x="1402" y="171" class="tiny muted">5 found</text>
  <line x1="1126" y1="191" x2="1510" y2="191" stroke="#414b5a"/>

  <g class="small">
    <rect x="1140" y="204" width="355" height="67" rx="7" fill="#121922" stroke="#2a3340"/>
    <rect x="1156" y="214" width="48" height="31" rx="5" fill="#282316" stroke="#f5c95a"/>
    <text x="1166" y="237" class="yellow">aa</text>
    <text x="1222" y="233" class="text">createRouteTable</text>
    <text x="1222" y="262" class="tiny muted">build route lookup table</text>
    <text x="1450" y="262" class="tiny muted">L4</text>

    <rect x="1140" y="286" width="355" height="67" rx="7" fill="#1c3038" stroke="#59c6ff" stroke-width="2"/>
    <rect x="1156" y="296" width="48" height="31" rx="5" fill="#16343e" stroke="#59c6ff"/>
    <text x="1166" y="319" class="cyan">as</text>
    <text x="1222" y="315" class="text">normalizePath</text>
    <text x="1222" y="344" class="tiny muted">clean URL path</text>
    <text x="1450" y="344" class="tiny muted">L10</text>

    <rect x="1140" y="368" width="355" height="67" rx="7" fill="#121922" stroke="#2a3340"/>
    <rect x="1156" y="378" width="48" height="31" rx="5" fill="#282316" stroke="#f5c95a"/>
    <text x="1166" y="401" class="yellow">df</text>
    <text x="1222" y="397" class="text">resolveMiddleware</text>
    <text x="1222" y="426" class="tiny muted">load async middleware</text>
    <text x="1450" y="426" class="tiny muted">L14</text>

    <rect x="1140" y="450" width="355" height="67" rx="7" fill="#121922" stroke="#2a3340"/>
    <rect x="1156" y="460" width="48" height="31" rx="5" fill="#282316" stroke="#f5c95a"/>
    <text x="1166" y="483" class="yellow">jk</text>
    <text x="1222" y="479" class="text">matchRoute</text>
    <text x="1222" y="508" class="tiny muted">match request path</text>
    <text x="1450" y="508" class="tiny muted">L19</text>

    <rect x="1140" y="532" width="355" height="67" rx="7" fill="#121922" stroke="#2a3340"/>
    <rect x="1156" y="542" width="48" height="31" rx="5" fill="#282316" stroke="#f5c95a"/>
    <text x="1166" y="565" class="yellow">kl</text>
    <text x="1222" y="561" class="text">renderNotFound</text>
    <text x="1222" y="590" class="tiny muted">404 fallback response</text>
    <text x="1450" y="590" class="tiny muted">L24</text>
  </g>

  <line x1="1126" y1="744" x2="1510" y2="744" stroke="#303a48"/>
  <text x="1144" y="786" class="small text">Interaction model</text>
  <text x="1148" y="821" class="tiny muted">aa/as/df...  jump immediately</text>
  <text x="1148" y="847" class="tiny muted">j/k          move selection</text>
  <text x="1148" y="873" class="tiny muted">Enter        jump selected</text>
  <text x="1148" y="899" class="tiny muted">r            rescan buffer</text>

  <text x="90" y="954" class="tiny muted">Concept: functions get temporary two-key marks in the buffer; the right TUI panel lists the same keys for direct jumps.</text>
</svg>
